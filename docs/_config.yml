theme: jekyll-theme-cayman
title: 金览 JinLan
description: AI 驱动的财经信息聚合系统 - 每日早8晚8更新
baseurl: "/Horizon" # the subpath of your site, e.g. /blog
url: "https://lgjjennie-ship-it.github.io" # the base hostname & protocol for your site, e.g. http://example.com

# Build settings
markdown: kramdown
future: true # Allow future posts to be published
plugins:
  - jekyll-feed
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
